<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060610" />

  <title>Side Quests To Freedom</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <meta name="description" content="Turning side hustles into financial freedom — one quest at a time." />

  <!-- Redirect to /links (primary page while the blog is not yet live) -->
  <meta http-equiv="refresh" content="0; url=/links" />
  <link rel="canonical" href="https://sidequeststofreedom.com/links" />

  <style>
    /* Fallback display if the redirect is blocked */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060610;
      color: #E2E2F0;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    a {
      color: #6E56CF;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    a:hover { color: #00E5A0; }

    p { font-size: 0.9rem; color: rgba(226, 226, 240, 0.6); line-height: 1.6; }
  </style>
</head>
<body>
  <p>
    Redirecting&hellip;
    <br /><br />
    <a href="/links">Click here if you are not redirected.</a>
  </p>
</body>
</html>
